<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD Smart Campus — Design Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0eee9;min-height:100vh;overflow:hidden;font-family:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased}
.material-symbols-outlined{font-family:'Material Symbols Outlined'!important;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;user-select:none;font-weight:normal;font-style:normal;line-height:1;letter-spacing:normal;text-transform:none;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-feature-settings:'liga';-webkit-font-smoothing:antialiased}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.msym-light{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}

/* ============ CD SMART CAMPUS — DESIGN SYSTEM ============ */
:root{
  --cd-ink:#0b1a2c;
  --cd-ink-2:#1e3a5f;
  --cd-ink-3:#475569;
  --cd-ink-4:#64748b;
  --cd-line:#e4e8ef;
  --cd-line-2:#eef1f6;
  --cd-surface:#ffffff;
  --cd-surface-2:#f7f8fb;
  --cd-surface-3:#f1f3f8;
  --cd-primary:#1a56db;
  --cd-primary-2:#0f3fb0;
  --cd-primary-soft:rgba(26,86,219,.08);
  --cd-primary-tint:rgba(26,86,219,.04);
  --cd-accent:#f59e0b;
  --cd-success:#0f9e6e;
  --cd-danger:#dc2626;
  --cd-radius:14px;
  --cd-radius-sm:10px;
  --cd-radius-lg:18px;
  --cd-shadow-xs:0 1px 2px rgba(11,26,44,.04);
  --cd-shadow-sm:0 1px 3px rgba(11,26,44,.06),0 0 1px rgba(11,26,44,.04);
  --cd-shadow-md:0 4px 24px -6px rgba(11,26,44,.08),0 1px 3px rgba(11,26,44,.04);
  --cd-shadow-lg:0 20px 60px -20px rgba(11,26,44,.18),0 2px 6px rgba(11,26,44,.05);
  --cd-glass:rgba(255,255,255,.82);
  --cd-glass-border:rgba(255,255,255,.7);
  --cd-mono:'IBM Plex Mono',ui-monospace,monospace;
}

/* Phone frame */
.cd-phone{
  width:100%;height:100%;background:var(--cd-surface);
  font-family:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,sans-serif;
  color:var(--cd-ink);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.cd-phone-bg{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 0% 0%,rgba(26,86,219,.08) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 100% 8%,rgba(245,158,11,.05) 0%,transparent 55%),
    linear-gradient(180deg,#fbfcfe 0%,#ffffff 45%,#fbfcfe 100%);
}
.cd-phone-inner{position:relative;z-index:1;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:86px}
.cd-phone-inner::-webkit-scrollbar{width:0}

/* Status bar */
.cd-status{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:600;color:var(--cd-ink);letter-spacing:-0.1px;flex-shrink:0;position:relative;z-index:2}
.cd-status-r{display:flex;gap:5px;align-items:center}

/* Phone typography */
.cd-phone h1,.cd-phone h2,.cd-phone h3,.cd-phone p,.cd-phone span,.cd-phone div,.cd-phone button,.cd-phone input{font-family:inherit}
.cd-phone .mono,.cd-phone .tabular{font-family:var(--cd-mono);font-variant-numeric:tabular-nums}

/* App bar (mobile) */
.cd-appbar{padding:8px 20px 4px;display:flex;align-items:center;gap:12px}
.cd-appbar-title{font-size:22px;font-weight:600;color:var(--cd-ink);letter-spacing:-0.4px;line-height:1.15}
.cd-appbar-sub{font-size:11px;color:var(--cd-ink-4);font-family:var(--cd-mono);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px}

/* Cards */
.cd-card{background:var(--cd-surface);border:1px solid var(--cd-line);border-radius:var(--cd-radius);box-shadow:var(--cd-shadow-xs)}
.cd-card-hov{transition:all .2s}
.cd-card-hov:hover{box-shadow:var(--cd-shadow-md);border-color:#d8dde7}
.cd-glass-card{background:var(--cd-glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--cd-glass-border);border-radius:var(--cd-radius);box-shadow:var(--cd-shadow-sm)}

/* Buttons */
.cd-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:10px;font-weight:500;font-size:13px;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.cd-btn-primary{background:var(--cd-ink);color:#fff}
.cd-btn-primary:hover{background:#000}
.cd-btn-secondary{background:#fff;color:var(--cd-ink);border-color:var(--cd-line)}
.cd-btn-secondary:hover{background:var(--cd-surface-2);border-color:#d8dde7}
.cd-btn-ghost{background:transparent;color:var(--cd-ink-3)}
.cd-btn-ghost:hover{background:var(--cd-surface-2)}
.cd-btn-sm{padding:6px 10px;font-size:12px;border-radius:8px}

/* Chip / Badge */
.cd-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;background:var(--cd-surface-3);color:var(--cd-ink-2);border:1px solid transparent}
.cd-chip-primary{background:var(--cd-primary-soft);color:var(--cd-primary-2)}
.cd-chip-success{background:rgba(15,158,110,.1);color:var(--cd-success)}
.cd-chip-warn{background:rgba(245,158,11,.1);color:#b45309}
.cd-chip-danger{background:rgba(220,38,38,.08);color:var(--cd-danger)}
.cd-chip-ink{background:var(--cd-ink);color:#fff}

/* Dot */
.cd-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Section label (small caps) */
.cd-label{font-size:10px;font-weight:600;color:var(--cd-ink-4);text-transform:uppercase;letter-spacing:1px;font-family:var(--cd-mono)}

/* Placeholder image */
.cd-ph{
  background:
    repeating-linear-gradient(135deg,rgba(11,26,44,.035) 0 8px,transparent 8px 16px),
    var(--cd-surface-2);
  border:1px solid var(--cd-line);
  border-radius:var(--cd-radius-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--cd-ink-4);font-family:var(--cd-mono);font-size:10px;letter-spacing:0.6px;text-transform:uppercase;
  flex-direction:column;gap:4px;
}

/* Bottom nav */
.cd-bnav{position:absolute;bottom:0;left:0;right:0;height:72px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--cd-line);display:flex;align-items:stretch;z-index:10}
.cd-bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--cd-ink-4);padding-top:8px;position:relative}
.cd-bnav-item.active{color:var(--cd-ink)}
.cd-bnav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--cd-ink);border-radius:0 0 2px 2px}
.cd-bnav-label{font-size:9.5px;font-weight:500;letter-spacing:0.2px}
.cd-bnav-label-en{font-size:8.5px;color:var(--cd-ink-4);font-family:var(--cd-mono);letter-spacing:0.4px;text-transform:uppercase}

/* Bilingual */
.cd-bi{line-height:1.15}
.cd-bi-en{font-size:0.68em;color:var(--cd-ink-4);font-family:var(--cd-mono);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-top:2px;font-weight:500}

/* Score bar */
.cd-score-bar{height:6px;background:var(--cd-surface-3);border-radius:3px;overflow:hidden}
.cd-score-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

/* Admin desktop */
.cd-admin{width:100%;height:100%;background:var(--cd-surface-2);font-family:'IBM Plex Sans Thai','IBM Plex Sans',system-ui,sans-serif;color:var(--cd-ink);display:flex;overflow:hidden}
.cd-admin-side{width:240px;flex-shrink:0;background:#fff;border-right:1px solid var(--cd-line);display:flex;flex-direction:column}
.cd-admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.cd-admin-topbar{height:64px;background:#fff;border-bottom:1px solid var(--cd-line);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0}
.cd-admin-content{flex:1;overflow-y:auto;padding:28px}
.cd-admin-content::-webkit-scrollbar{width:10px}
.cd-admin-content::-webkit-scrollbar-thumb{background:#d8dde7;border-radius:5px;border:2px solid var(--cd-surface-2)}

.cd-nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;margin:2px 10px;border-radius:10px;color:var(--cd-ink-3);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;font-family:inherit;width:calc(100% - 20px);text-align:left}
.cd-nav-item:hover{background:var(--cd-surface-2);color:var(--cd-ink)}
.cd-nav-item.active{background:var(--cd-ink);color:#fff}
.cd-nav-item.active .cd-nav-en{color:rgba(255,255,255,.55)}
.cd-nav-en{font-size:10px;font-family:var(--cd-mono);color:var(--cd-ink-4);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-top:1px;font-weight:400}

.cd-kpi{background:#fff;border:1px solid var(--cd-line);border-radius:var(--cd-radius);padding:18px;position:relative;overflow:hidden}
.cd-kpi-label{font-size:11px;color:var(--cd-ink-4);font-family:var(--cd-mono);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
.cd-kpi-value{font-size:30px;font-weight:600;color:var(--cd-ink);letter-spacing:-0.8px;font-variant-numeric:tabular-nums}
.cd-kpi-delta{font-size:11px;color:var(--cd-success);font-family:var(--cd-mono);margin-top:2px}

/* Table */
.cd-table{width:100%;border-collapse:collapse;font-size:13px}
.cd-table th{text-align:left;padding:10px 14px;font-weight:500;color:var(--cd-ink-4);font-size:11px;text-transform:uppercase;letter-spacing:0.6px;font-family:var(--cd-mono);border-bottom:1px solid var(--cd-line);background:var(--cd-surface-2)}
.cd-table td{padding:12px 14px;border-bottom:1px solid var(--cd-line-2);color:var(--cd-ink-2)}
.cd-table tr:hover td{background:var(--cd-surface-2)}

/* Tweaks panel */
.tweaks-panel{position:fixed;bottom:20px;right:20px;width:300px;background:#fff;border:1px solid var(--cd-line);border-radius:14px;box-shadow:0 20px 60px -10px rgba(11,26,44,.2);padding:16px;z-index:1000;display:none;font-family:'IBM Plex Sans','system-ui',sans-serif}
.tweaks-panel.open{display:block}
.tweaks-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cd-line-2);font-size:13px}
.tweaks-row:last-child{border-bottom:none}
.tweaks-swatches{display:flex;gap:6px}
.tweaks-sw{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--cd-line);cursor:pointer;transition:transform .12s}
.tweaks-sw.on{box-shadow:0 0 0 2px var(--cd-ink)}
.tweaks-sw:hover{transform:scale(1.1)}
.tweaks-seg{display:inline-flex;background:var(--cd-surface-2);border-radius:7px;padding:2px;font-size:11px;font-family:var(--cd-mono)}
.tweaks-seg button{background:none;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;color:var(--cd-ink-4);font-family:inherit}
.tweaks-seg button.on{background:#fff;color:var(--cd-ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* Theme variants — applied via [data-theme] on phone/admin root */
[data-theme="dark"].cd-phone,[data-theme="dark"] .cd-phone{background:#0b1220;color:#e2e8f0}
[data-theme="dark"].cd-phone .cd-phone-bg,[data-theme="dark"] .cd-phone-bg{background:
  radial-gradient(ellipse 70% 45% at 0% 0%,rgba(91,145,255,.14) 0%,transparent 55%),
  radial-gradient(ellipse 60% 40% at 100% 8%,rgba(245,158,11,.08) 0%,transparent 55%),
  linear-gradient(180deg,#0b1220 0%,#0f172a 45%,#0b1220 100%)}

/* Density */
[data-density="compact"] .cd-card{padding:10px!important}
</style>
</head>
