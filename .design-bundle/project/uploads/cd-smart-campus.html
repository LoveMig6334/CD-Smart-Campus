<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#137fec;--primary-dark:#0f66bd;--royal-blue:#1a56db;
  --vivid-yellow:#fbbf24;--accent-yellow:#ffb800;
  --dark-slate:#1e3a5f;--cool-gray:#64748b;
  --bg-light:#ffffff;--bg-dark:#101922;--card-dark:#1c232b;--foreground:#0f172a;
  --glass-white:rgba(255,255,255,0.75);--glass-border:rgba(255,255,255,0.6);
  --glass-shadow:rgba(26,86,219,0.08);
  --font-display:'Mitr',sans-serif;--font-mono:'Space Mono',monospace;
}
html{font-family:var(--font-display);color:var(--foreground);-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{background:var(--bg-light);min-height:100dvh;overflow-x:hidden}
::selection{background:rgba(19,127,236,0.3)}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.font-mono{font-family:var(--font-mono)}

/* Mesh gradient background */
.mesh-bg{
  background:linear-gradient(135deg,#f8fafc 0%,#ffffff 50%,#f8fafc 100%);
  position:relative;
}
.mesh-bg::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%,rgba(26,86,219,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 90% 15%,rgba(100,116,139,0.05) 0%,transparent 50%),
    radial-gradient(ellipse 55% 45% at 50% 90%,rgba(26,86,219,0.06) 0%,transparent 55%);
  animation:meshShift 20s ease infinite;
}
@keyframes meshShift{0%,100%{opacity:1}50%{opacity:.7}}

/* Glass utilities */
.glass-card{
  background:var(--glass-white);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 4px 24px -1px rgba(26,86,219,0.06),0 0 1px rgba(26,86,219,0.1);
  border-radius:1rem;transition:all .2s;
}
.glass-card:hover{background:rgba(255,255,255,0.85);box-shadow:0 8px 32px -2px rgba(26,86,219,0.1),0 0 1px rgba(26,86,219,0.12)}
.glass-navbar{
  background:rgba(255,255,255,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:0 4px 30px -2px rgba(26,86,219,0.08),0 1px 2px rgba(0,0,0,0.02);
}
.glass-panel{
  background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.5);box-shadow:0 2px 16px -1px rgba(26,86,219,0.05);
}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.25rem;border-radius:.75rem;font-weight:500;font-size:.875rem;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#fff;color:var(--dark-slate);border:1px solid #e2e8f0}.btn-secondary:hover{background:#f8fafc}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-pill{border-radius:9999px;padding:.5rem 1.25rem;font-size:.8125rem}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:.125rem .625rem;border-radius:9999px;font-size:.75rem;font-weight:500}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.anim-fade{animation:fadeIn .3s ease-out both}
.anim-slide{animation:slideUp .4s ease-out both}
.anim-float{animation:float 6s ease-in-out infinite}

/* Page container */
.page-wrap{position:relative;z-index:1;max-width:28rem;margin:0 auto;width:100%;padding:0 1rem}
.page-wrap-lg{position:relative;z-index:1;max-width:80rem;margin:0 auto;width:100%;padding:0 1.5rem}

/* Modal */
.modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .2s}
.modal-content{background:#fff;border-radius:1rem;padding:1.5rem;max-width:28rem;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);animation:slideUp .3s cubic-bezier(.16,1,.3,1)}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:.8125rem}
.cal-day{padding:.5rem .25rem;border-radius:.5rem;cursor:pointer;transition:all .15s;position:relative}
.cal-day:hover{background:rgba(19,127,236,.08)}
.cal-day.today{background:var(--primary);color:#fff;font-weight:600}
.cal-day.has-event::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--primary)}
.cal-day.today.has-event::after{background:#fff}

/* Sport color cards */
.sport-card{border-radius:1rem;padding:1.25rem;color:#fff;position:relative;overflow:hidden}
.sport-card::after{content:'🏆';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-size:4rem;opacity:.12;pointer-events:none}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* Tab active */
.tab-active{color:var(--primary);border-bottom:2px solid var(--primary)}

/* Input */
.input{width:100%;padding:.75rem 1rem;border:1px solid #e2e8f0;border-radius:.5rem;font-family:inherit;font-size:.875rem;background:rgba(255,255,255,.7);transition:all .2s;outline:none}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(19,127,236,.15);background:#fff}

/* Bottom nav safe area */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .bottom-nav{padding-bottom:env(safe-area-inset-bottom)}
}

/* Desktop breakpoint */
@media(min-width:768px){
  .page-wrap{max-width:32rem}
  .hide-desktop{display:none!important}
}
@media(max-width:767px){
  .hide-mobile{display:none!important}
}

/* Lost & Found grid */
.lf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
@media(min-width:640px){.lf-grid{grid-template-columns:repeat(3,1fr)}}

/* Ticket card top bar */
.ticket-bar{height:4px;background:linear-gradient(90deg,#1a56db,#06b6d4,#fbbf24);border-radius:4px 4px 0 0}

/* Admin stat card */
.stat-card{position:relative;overflow:hidden}
.stat-card .watermark{position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.06;pointer-events:none;color:var(--royal-blue)}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;background:#cbd5e1;border-radius:9999px;cursor:pointer;transition:.2s;border:none}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:22px}
</style>
</head>

function BottomNav() {

    { icon: 'calendar_month', label: 'ปฏิทิน', page: 'calendar' },

  return `<nav class="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:50;height:4rem;display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,0.6)" >

    ${items.map(i => {
      const active = state.page === i.page;
      return `<button onclick="navigate('${i.page}')" style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:.25rem .5rem;font-family:inherit;transition:all .15s">

function CalendarPage() {
  const m = state.calMonth;
  const y = state.calYear;
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();

  const eventDates = EVENTS.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  }).map(e => new Date(e.date).getDate());

  const monthEvents = EVENTS.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });

  let calCells = days.map(d => `<div style="padding:.5rem;font-size:.6875rem;color:var(--cool-gray);font-weight:500">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) calCells += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
    const hasEvent = eventDates.includes(d);
    calCells += `<div class="cal-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}">${d}</div>`;
  }

  return `<div class="page-wrap" style="padding-bottom:6rem;padding-top:1rem">
    ${PageHeader('ปฏิทินกิจกรรม', `${months[m]} ${y + 543}`)}

    <div class="glass-card anim-slide" style="padding:1rem;margin-bottom:1.25rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <button onclick="state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--}render()" style="background:none;border:none;cursor:pointer;padding:.25rem">
          <span class="material-symbols-outlined" style="color:var(--primary)">chevron_left</span>
        </button>
        <span style="font-weight:600;color:var(--dark-slate)">${months[m]} ${y + 543}</span>
        <button onclick="state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++}render()" style="background:none;border:none;cursor:pointer;padding:.25rem">
          <span class="material-symbols-outlined" style="color:var(--primary)">chevron_right</span>
        </button>
      </div>
      <div class="cal-grid">${calCells}</div>
    </div>

    <div class="anim-slide" style="animation-delay:100ms">
      <h3 style="font-size:.875rem;font-weight:600;color:var(--dark-slate);margin-bottom:.75rem">กิจกรรมในเดือนนี้</h3>
      <div style="display:flex;flex-direction:column;gap:.625rem">
        ${monthEvents.length ? monthEvents.map((e,i) => EventCard(e,i)).join('') : '<p style="text-align:center;color:var(--cool-gray);font-size:.875rem;padding:2rem 0">ไม่มีกิจกรรมในเดือนนี้</p>'}
      </div>
    </div>
  </div>${BottomNav()}`;
}

function doLogin() {
  const email = prompt('กรอกอีเมลโรงเรียน (0XXXXX@cds.ac.th):');
  if (!email) return;
  if (!email.match(/^0\d{4,5}@cds\.ac\.th$/)) {
    alert('❌ กรุณาใช้อีเมลโรงเรียนเท่านั้น\nรูปแบบ: 0XXXXX@cds.ac.th');
    return;
  }
  state.loggedIn = true;
  state.user = email.split('@')[0];
  const isAdmin = email.startsWith('0admin') || email.startsWith('00000');
  state.isAdmin = isAdmin;
  navigate(isAdmin ? 'dashboard' : 'home');
}

function render() {
  const app = document.getElementById('app');
  const page = state.page;

  let html = '';
  switch (page) {
    case 'home': html = HomePage(); break;
    case 'calendar': html = CalendarPage(); break;
    case 'ports': html = PortfolioPage(); break;
    case 'colorsport': html = ColorSportPage(); break;
    case 'lunchmenu': html = LunchMenuPage(); break;
    case 'booking': html = BookingPage(); break;
    case 'lost-find': html = LostFoundPage(); break;
    case 'login': html = LoginPage(); break;
    case 'dashboard': html = DashboardPage(); break;
    case 'musicday': html = MusicDayPage(); break;
    default: html = HomePage();
  }
  app.innerHTML = html;
}
